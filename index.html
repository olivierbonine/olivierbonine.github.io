<script>
    // Global memory array to store loaded items
    let allFeedItems = [];

    // Cleaned up configurations using a robust JSON converter API
    const feedSources = [
        {
            url: "https://api.rss2json.com/v1/api.json?rss_url=https://www.nngroup.com/feed/rss/",
            category: "blog",
            sourceName: "Nielsen Norman Group",
            badgeColorClass: "text-emerald-400 bg-emerald-950/50 border-emerald-900/50"
        },
        {
            url: "https://api.rss2json.com/v1/api.json?rss_url=https://designbetter.co/feed", 
            category: "podcast",
            sourceName: "Design Better Podcast",
            badgeColorClass: "text-sky-400 bg-sky-950/50 border-sky-900/50"
        },
        {
            url: "https://api.rss2json.com/v1/api.json?rss_url=https://www.youtube.com/feeds/videos.xml?channel_id=UC6t1O76G0jYXOAoYCm153dA",
            category: "video",
            sourceName: "Lenny's Podcast",
            badgeColorClass: "text-purple-400 bg-purple-950/50 border-purple-900/50"
        }
    ];

    async function fetchSingleFeed(source) {
        const res = await fetch(source.url);
        if (!res.ok) throw new Error(`Failed network request for ${source.sourceName}`);
        
        const data = await res.json();
        const items = data.items || [];
        
        return items.slice(0, 4).map(item => {
            let title = item.title || "Untitled Content";
            let link = item.link || "#";
            
            // Clean up descriptions (stripping HTML tags & truncating)
            let desc = item.description || "";
            desc = desc.replace(/<[^>]*>/g, ''); 
            
            // Contextual Guard: YouTube video descriptions often start with generic channel text
            // If it's a video, format the summary layout gracefully
            if (source.category === 'video') {
                if (!desc || desc.trim().length < 5) {
                    desc = "Deep-dive interview uncovering tactical product strategies, growth frameworks, and organizational design patterns used by elite tech teams.";
                } else if (desc.length > 150) {
                    desc = desc.substring(0, 147) + "...";
                }
            } else {
                if (desc.length > 130) desc = desc.substring(0, 127) + "...";
            }

            let pubDate = new Date(item.pubDate || Date.now());

            return {
                title: title,
                link: link,
                description: desc,
                category: source.category,
                sourceName: source.sourceName,
                badgeClass: source.badgeColorClass,
                pubDate: pubDate
            };
        });
    }

    async function loadAllFeeds() {
        const container = document.getElementById("feed");
        
        try {
            const fetchPromises = feedSources.map(src => fetchSingleFeed(src).catch(err => {
                console.error(`Feed Error [${src.sourceName}]:`, err);
                return []; 
            }));
            
            const results = await Promise.all(fetchPromises);
            allFeedItems = results.flat().sort((a, b) => b.pubDate - a.pubDate);

            if (allFeedItems.length === 0) throw new Error("All resource operations timed out.");
            
            renderCards(allFeedItems);

        } catch (error) {
            container.innerHTML = `
                <div class="col-span-full p-8 rounded-xl border border-red-900/20 bg-red-950/10 text-center">
                    <p class="text-red-400 text-sm font-medium">Unable to aggregate dynamic feeds.</p>
                    <p class="text-slate-500 text-xs mt-2">${error.message}</p>
                </div>
            `;
        }
    }

    function renderCards(items) {
        const container = document.getElementById("feed");
        
        if (items.length === 0) {
            container.innerHTML = `
                <div class="col-span-full p-12 text-center text-slate-500 text-sm">
                    No active items found under this filter selection.
                </div>
            `;
            return;
        }

        container.innerHTML = items.map(item => `
            <div class="p-6 rounded-xl border border-slate-800 bg-slate-900/50 flex flex-col justify-between hover:border-slate-700 transition duration-300">
                <div>
                    <div class="flex justify-between items-start mb-4">
                        <span class="text-[10px] font-bold tracking-wider uppercase px-2.5 py-1 rounded border ${item.badgeClass}">
                            ${item.category}
                        </span>
                        <span class="text-xs text-slate-500">${item.sourceName}</span>
                    </div>
                    <h3 class="text-lg font-bold text-white hover:text-brand-500 transition-colors">
                        <a href="${item.link}" target="_blank">${item.title}</a>
                    </h3>
                    
                    <!-- Conditional UI: If it is a video, explicitly format a Summary Label -->
                    ${item.category === 'video' ? `
                        <div class="mt-3 px-3 py-2 rounded bg-purple-950/20 border border-purple-900/30 text-xs text-purple-300">
                            <span class="font-bold tracking-wide uppercase text-[9px] block mb-1 text-purple-400">Video Executive Summary</span>
                            ${item.description}
                        </div>
                    ` : `
                        <p class="text-sm text-slate-400 mt-2 leading-relaxed">${item.description}</p>
                    `}
                </div>
                <div class="mt-6 pt-4 border-t border-slate-800/80 flex items-center justify-between">
                    <span class="text-xs text-slate-500 font-mono">${item.pubDate.toLocaleDateString(undefined, {month: 'short', day: 'numeric'})}</span>
                    <a href="${item.link}" target="_blank" class="text-xs font-semibold text-brand-500 hover:underline flex items-center gap-1">
                        ${item.category === 'video' ? 'Watch Episode' : 'Access Content'} 
                        <svg class="w-3 h-3" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M10 6H6a2 2 0 00-2 2v10a2 2 0 002 2h10a2 2 0 002-2v-4M14 4h6m0 0v6m0-6L10 14"/></svg>
                    </a>
                </div>
            </div>
        `).join("");
    }

    function filterFeed(category) {
        const buttons = document.querySelectorAll('.filter-btn');
        buttons.forEach(btn => {
            btn.classList.remove('bg-brand-600', 'text-white');
            btn.classList.add('bg-slate-800', 'text-slate-300');
        });
        
        const activeBtn = document.getElementById(`btn-${category}`);
        if (activeBtn) {
            activeBtn.classList.remove('bg-slate-800', 'text-slate-300');
            activeBtn.classList.add('bg-brand-600', 'text-white');
        }

        if (category === 'all') {
            renderCards(allFeedItems);
        } else {
            const filtered = allFeedItems.filter(item => item.category === category);
            renderCards(filtered);
        }
    }

    document.addEventListener("DOMContentLoaded", loadAllFeeds);
</script>
