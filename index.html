<script>
  let allFeedItems = [];

  const feedSources = [
    {
      url: "https://www.nngroup.com/feed/rss/",
      category: "blog",
      sourceName: "Nielsen Norman Group",
      badgeColorClass: "text-emerald-400 bg-emerald-950/50 border-emerald-900/50",
      format: "rss"
    },
    {
      url: "https://designbetter.co/feed",
      category: "podcast",
      sourceName: "Design Better Podcast",
      badgeColorClass: "text-sky-400 bg-sky-950/50 border-sky-900/50",
      format: "rss"
    },
    {
      url: "https://www.youtube.com/feeds/videos.xml?channel_id=UC6t1O76G0jYXOAoYCm153dA",
      category: "video",
      sourceName: "Lenny's Podcast",
      badgeColorClass: "text-purple-400 bg-purple-950/50 border-purple-900/50",
      format: "atom"
    }
  ];

  async function fetchWithProxy(url) {
    const proxyUrl = `https://api.allorigins.win/raw?url=${encodeURIComponent(url)}`;
    const res = await fetch(proxyUrl);
    if (!res.ok) throw new Error(`Network request failed: ${res.status}`);
    return await res.text();
  }

  function getFirstText(node, names) {
    for (const name of names) {
      const match = node.querySelector(name);
      if (match && match.textContent && match.textContent.trim()) {
        return match.textContent.trim();
      }
    }

    const descendants = [...node.querySelectorAll("*")];
    for (const name of names) {
      const found = descendants.find(el => {
        const local = (el.localName || el.tagName || "").toLowerCase();
        return local === name.toLowerCase();
      });
      if (found && found.textContent && found.textContent.trim()) {
        return found.textContent.trim();
      }
    }

    return "";
  }

  function getItemLink(item, format) {
    if (format === "atom") {
      const alternate = item.querySelector('link[rel="alternate"]');
      if (alternate?.getAttribute("href")) return alternate.getAttribute("href");

      const firstLink = item.querySelector("link");
      if (firstLink?.getAttribute("href")) return firstLink.getAttribute("href");
      if (firstLink?.textContent?.trim()) return firstLink.textContent.trim();

      return "#";
    }

    return item.querySelector("link")?.textContent?.trim() || "#";
  }

  function cleanText(text, maxLen = 130) {
    const stripped = text.replace(/<[^>]*>/g, "").replace(/\s+/g, " ").trim();
    return stripped.length > maxLen ? stripped.slice(0, maxLen - 3) + "..." : stripped;
  }

  function escapeHtml(str) {
    return str
      .replace(/&/g, "&amp;")
      .replace(/</g, "&lt;")
      .replace(/>/g, "&gt;")
      .replace(/"/g, "&quot;")
      .replace(/'/g, "&#39;");
  }

  async function fetchSingleFeed(source) {
    const text = await fetchWithProxy(source.url);
    const xml = new DOMParser().parseFromString(text, "text/xml");

    if (xml.querySelector("parsererror")) {
      throw new Error(`Could not parse feed for ${source.sourceName}`);
    }

    const items = source.format === "atom"
      ? [...xml.querySelectorAll("entry")]
      : [...xml.querySelectorAll("item")];

    return items.slice(0, 4).map(item => {
      const title = getFirstText(item, ["title"]) || "Untitled Content";
      const rawDesc = getFirstText(item, ["summary", "description", "content", "media:description"]);
      const description = cleanText(rawDesc || "");
      const pubDateStr = getFirstText(item, ["pubDate", "published", "updated"]);
      const pubDate = pubDateStr ? new Date(pubDateStr) : new Date();

      return {
        title,
        link: getItemLink(item, source.format),
        description,
        category: source.category,
        sourceName: source.sourceName,
        badgeClass: source.badgeColorClass,
        pubDate: isNaN(pubDate.getTime()) ? new Date() : pubDate
      };
    });
  }

  async function loadAllFeeds() {
    const container = document.getElementById("feed");

    try {
      const fetchPromises = feedSources.map(src =>
        fetchSingleFeed(src).catch(err => {
          console.error(err);
          return [];
        })
      );

      const results = await Promise.all(fetchPromises);
      allFeedItems = results.flat().sort((a, b) => b.pubDate - a.pubDate);

      if (allFeedItems.length === 0) throw new Error("No feed items returned.");

      renderCards(allFeedItems);
    } catch (error) {
      container.innerHTML = `
        <div class="col-span-full p-8 rounded-xl border border-red-900/20 bg-red-950/10 text-center">
          <p class="text-red-400 text-sm font-medium">Unable to aggregate dynamic feeds.</p>
          <p class="text-slate-400 text-sm mt-2">If YouTube is still failing, the proxy is likely blocking that feed and a small backend proxy will be needed.</p>
        </div>
      `;
    }
  }

  function renderCards(items) {
    const container = document.getElementById("feed");

    if (items.length === 0) {
      container.innerHTML = `
        <div class="col-span-full p-12 text-center text-slate-500 text-sm">
          No active items found under this filter selection.
        </div>
      `;
      return;
    }

    container.innerHTML = items.map(item => `
      <div class="p-6 rounded-xl border border-slate-800 bg-slate-900/50 flex flex-col justify-between hover:border-slate-700 transition duration-300">
        <div>
          <div class="flex justify-between items-start mb-4 gap-2">
            <span class="text-[10px] font-bold tracking-wider uppercase px-2.5 py-1 rounded border ${item.badgeClass}">
              ${escapeHtml(item.category)}
            </span>
            <span class="text-xs text-slate-500">${escapeHtml(item.sourceName)}</span>
          </div>
          <h3 class="text-lg font-bold text-white hover:text-brand-500 transition-colors">
            <a href="${item.link}" target="_blank" rel="noopener noreferrer">${escapeHtml(item.title)}</a>
          </h3>
          <p class="text-sm text-slate-400 mt-2 leading-relaxed">${escapeHtml(item.description)}</p>
        </div>
        <div class="mt-6 pt-4 border-t border-slate-800/80 flex items-center justify-between">
          <span class="text-xs text-slate-500 font-mono">${item.pubDate.toLocaleDateString(undefined, { month: 'short', day: 'numeric' })}</span>
          <a href="${item.link}" target="_blank" rel="noopener noreferrer" class="text-xs font-semibold text-brand-500 hover:underline flex items-center gap-1">
            Access Content
            <svg class="w-3 h-3" fill="none" stroke="currentColor" viewBox="0 0 24 24">
              <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M10 6H6a2 2 0 00-2 2v10a2 2 0 002 2h10a2 2 0 002-2v-4M14 4h6m0 0v6m0-6L10 14"/>
            </svg>
          </a>
        </div>
      </div>
    `).join("");
  }

  function filterFeed(category) {
    const buttons = document.querySelectorAll('.filter-btn');
    buttons.forEach(btn => {
      btn.classList.remove('bg-brand-600', 'text-white');
      btn.classList.add('bg-slate-800', 'text-slate-300');
    });

    const activeBtn = document.getElementById(`btn-${category}`);
    if (activeBtn) {
      activeBtn.classList.remove('bg-slate-800', 'text-slate-300');
      activeBtn.classList.add('bg-brand-600', 'text-white');
    }

    if (category === 'all') {
      renderCards(allFeedItems);
    } else {
      renderCards(allFeedItems.filter(item => item.category === category));
    }
  }

  document.addEventListener("DOMContentLoaded", loadAllFeeds);
</script>
